<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset=".55" stop-color="#2A5A94"/>
      <stop offset="1" stop-color="#081730"/>
    </linearGradient>
    <radialGradient id="wh-glow" cx=".8" cy=".3" r=".75">
      <stop offset="0" stop-color="#F5A524" stop-opacity=".30"/>
      <stop offset="1" stop-color="#F5A524" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0v60" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#wh)"/>
  <rect width="1600" height="1000" fill="url(#grid2)"/>
  <rect width="1600" height="1000" fill="url(#wh-glow)"/>
  <g fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3">
    <!-- Shelves -->
    <g stroke="rgba(255,255,255,.22)">
      <line x1="100" y1="280" x2="900" y2="280"/>
      <line x1="100" y1="420" x2="900" y2="420"/>
      <line x1="100" y1="560" x2="900" y2="560"/>
      <line x1="100" y1="700" x2="900" y2="700"/>
    </g>
    <!-- Boxes -->
    <rect x="140" y="300" width="120" height="100" rx="4"/>
    <rect x="280" y="300" width="160" height="100" rx="4"/>
    <rect x="460" y="300" width="100" height="100" rx="4"/>
    <rect x="580" y="320" width="180" height="80" rx="4"/>
    <rect x="140" y="440" width="200" height="100" rx="4"/>
    <rect x="360" y="440" width="140" height="100" rx="4"/>
    <rect x="520" y="460" width="240" height="80" rx="4"/>
    <rect x="140" y="580" width="160" height="100" rx="4"/>
    <rect x="320" y="580" width="200" height="100" rx="4"/>
    <rect x="540" y="600" width="220" height="80" rx="4"/>
    <!-- Scanner / arch -->
    <path d="M1080 200 L1080 760 L1480 760 L1480 200 Z"/>
    <line x1="1080" y1="380" x2="1480" y2="380"/>
    <line x1="1080" y1="560" x2="1480" y2="560"/>
  </g>
  <g fill="#F5A524">
    <rect x="1260" y="430" width="40" height="100" rx="4"/>
